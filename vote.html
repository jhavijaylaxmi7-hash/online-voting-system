<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Cast Your Vote</h1>

    <button onclick="vote('Candidate A')">Candidate A</button>
    <button onclick="vote('Candidate B')">Candidate B</button>
    <button onclick="vote('Candidate C')">Candidate C</button>
</div>

<script>
function vote(candidate) {

    let email = localStorage.getItem("email");

    if(!email){
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    fetch('http://127.0.0.1:5000/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: email,
            candidate: candidate
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        // 🔥 Direct Redirect after voting
            window.location.href = "results.html";
        
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
