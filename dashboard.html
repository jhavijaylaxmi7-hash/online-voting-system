<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <h3>Live Voting Results</h3>
    <ul id="resultList"></ul>

    <button onclick="resetVotes()">Reset Votes</button>
    <button onclick="logout()">Logout</button>
</div>

<script>

// 🔐 Check login
if(localStorage.getItem("admin") !== "true"){
    alert("Access denied!");
    window.location.href = "admin.html";
}

// 🔹 Load results
function loadResults() {
    fetch('http://127.0.0.1:5000/results')
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("resultList");
        list.innerHTML = "";

        data.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item[0] + " : " + item[1] + " votes";
            list.appendChild(li);
        });
    });
}

// 🔥 Reset votes
function resetVotes() {
    if(confirm("Are you sure to reset all votes?")){

        fetch('http://127.0.0.1:5000/reset_votes', {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadResults();
        });
    }
}

// 🔴 Logout
function logout() {
    localStorage.removeItem("admin");
    window.location.href = "admin.html";
}

// Auto load
loadResults();

</script>

</body>
</html>
